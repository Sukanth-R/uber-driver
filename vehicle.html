<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Vehicle Management</title>
        <link rel="stylesheet" href="vehicle.css"/>
        <link rel="stylesheet" href="style.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="navbar"></div>
        <div class="vehicle-management">
            <div class="content">
            <h1>Vehicles Management</h1>
            <p>Manage your vehicle information,<br/>  update details, and ensure your vehicle is ready for rides.</p>
            <button class="add-vehicle">Add New Vehicle</button>
            </div>
            <div class="vehicle-image">
                <img src="images/uber.jpg" alt="Vehicle Management"/> 
            </div>
        </div>
        <h2><i class="bi bi-car-front-fill"></i>My Vehicles</h2>
        <div class="my-vehicles">
            <div class="vehicle-card">
                <img src="images/bike.jpg" alt="Toyota Camry"/>
                <h3><i class="bi bi-car-front-fill"></i>Toyota Camry</h3>
                <p>License Plate: ABC-1234</p>
                <p>Type: SUV</p>
                <p>Capacity: 1</p>
                <div class="vehicle-buttons">
                    <button class="edit-vehicle">Edit</button>
                    <button class="delete-vehicle">Delete</button>
                </div>
            </div>
            <div class="vehicle-card">
                <img src="images/car.jpg" alt="Toyota Camry"/>
                <h3><i class="bi bi-car-front-fill"></i>Honda Accord</h3>
                <p>License Plate: XYZ-5678</p>
                <p>Type: Sedan</p>
                <p>Capacity: 4</p>
                <div class="vehicle-buttons">
                    <button class="edit-vehicle">Edit</button>
                    <button class="delete-vehicle">Delete</button>
                </div>
            </div>
        </div>
        <div id="footer"></div>
        <script>
            fetch("navbar.html")
            .then(response => response.text())
            .then(data => {document.getElementById("navbar").innerHTML = data;});
            fetch("footer.html")
            .then(response => response.text())
            .then(data => {document.getElementById("footer").innerHTML = data;});
        </script>
    </body>
</html>
